components:
  schemas:
    Call:
      type: object
      title: com.racing.data.Call
      properties:
        call_id:
          type:
            - integer
            - 'null'
        note_id:
          type:
            - integer
            - 'null'
        sequence_number:
          type:
            - integer
            - 'null'
        gear:
          type:
            - integer
            - 'null'
        direction:
          type:
            - string
            - 'null'
        distance:
          type:
            - integer
            - 'null'
        intensity_id:
          type:
            - integer
            - 'null'
        warning_id:
          type:
            - integer
            - 'null'
        tip_id:
          type:
            - integer
            - 'null'
    ValidationIssue:
      type: object
      title: com.racing.data.ValidationIssue
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ValidationErrorResponse:
      type: object
      title: com.racing.data.ValidationErrorResponse
      required:
        - details
      properties:
        error:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    Car:
      type: object
      title: com.racing.data.Car
      required:
        - name
      properties:
        car_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        model_id:
          type:
            - integer
            - 'null'
    Crew:
      type: object
      title: com.racing.data.Crew
      properties:
        crew_id:
          type:
            - integer
            - 'null'
        driver_id:
          type:
            - integer
            - 'null'
        codriver_id:
          type:
            - integer
            - 'null'
        car_id:
          type:
            - integer
            - 'null'
        team_id:
          type:
            - integer
            - 'null'
    Codriver:
      type: object
      title: com.racing.data.Codriver
      required:
        - name
      properties:
        codriver_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        number:
          type:
            - integer
            - 'null'
    Driver:
      type: object
      title: com.racing.data.Driver
      required:
        - name
      properties:
        driver_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        number:
          type:
            - integer
            - 'null'
    Intensity:
      type: object
      title: com.racing.data.Intensity
      required:
        - name
      properties:
        intensity_id:
          type:
            - integer
            - 'null'
        name:
          type: string
    Manufacturer:
      type: object
      title: com.racing.data.Manufacturer
      required:
        - name
      properties:
        manufacturer_id:
          type:
            - integer
            - 'null'
        name:
          type: string
    Model:
      type: object
      title: com.racing.data.Model
      required:
        - name
      properties:
        model_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        manufacturer_id:
          type:
            - integer
            - 'null'
    NoteSet:
      type: object
      title: com.racing.data.NoteSet
      properties:
        note_id:
          type:
            - integer
            - 'null'
        crew_id:
          type:
            - integer
            - 'null'
        name:
          type:
            - string
            - 'null'
        stage_id:
          type:
            - integer
            - 'null'
        conditions:
          type:
            - string
            - 'null'
    Stage:
      type: object
      title: com.racing.data.Stage
      required:
        - name
      properties:
        stage_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        distance:
          type:
            - number
            - 'null'
    Rally:
      type: object
      title: com.racing.data.Rally
      required:
        - name
        - date
      properties:
        rally_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        date:
          type: string
          format: date
    RallyEntry:
      type: object
      title: com.racing.data.RallyEntry
      properties:
        entry_id:
          type:
            - integer
            - 'null'
        rally_id:
          type:
            - integer
            - 'null'
        crew_id:
          type:
            - integer
            - 'null'
        car_number:
          type:
            - integer
            - 'null'
    RallyStageMap:
      type: object
      title: com.racing.data.RallyStageMap
      properties:
        rally_stage_id:
          type:
            - integer
            - 'null'
        rally_id:
          type:
            - integer
            - 'null'
        stage_id:
          type:
            - integer
            - 'null'
        stage_order:
          type:
            - integer
            - 'null'
    Team:
      type: object
      title: com.racing.data.Team
      required:
        - name
      properties:
        team_id:
          type:
            - integer
            - 'null'
        name:
          type: string
        manufacturer_id:
          type:
            - integer
            - 'null'
    Tip:
      type: object
      title: com.racing.data.Tip
      required:
        - description
      properties:
        tip_id:
          type:
            - integer
            - 'null'
        description:
          type: string
    Warning:
      type: object
      title: com.racing.data.Warning
      required:
        - description
      properties:
        warning_id:
          type:
            - integer
            - 'null'
        description:
          type: string
