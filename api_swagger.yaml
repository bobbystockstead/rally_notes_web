openapi: 3.1.1
info:
  title: Rally Notes API
  version: 1.0.0
  description: API for managing rally races and team information
paths:
  /calls:
    post:
      tags:
        - Calls
      summary: Create call
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Call'
        required: true
      responses:
        '201':
          description: Call created
        '400':
          description: 'Invalid request: missing required note_id/sequence_number
            and/or one or more referenced IDs do not exist (note, intensity, warning,
            tip)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    get:
      tags:
        - Calls
      summary: Get all calls
      responses:
        '200':
          description: List of call records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Call'
  /calls/{id}:
    put:
      tags:
        - Calls
      summary: Update call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Call'
        required: true
      responses:
        '204':
          description: Call updated
        '404':
          description: Call not found
        '400':
          description: 'Invalid request: id must be an integer or one or more references
            do not exist (note, intensity, warning, tip)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags:
        - Calls
      summary: Delete call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Call deleted
        '404':
          description: Call not found
        '400':
          description: 'Invalid path parameter: id must be an integer'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    get:
      tags:
        - Calls
      summary: Get call by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
        '404':
          description: Call not found
